name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  validate-json:
    name: JSON/YAML Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate manifest.json
        run: python3 -m json.tool custom_components/kkt_kolbe/manifest.json > /dev/null

      - name: Validate strings.json
        run: python3 -m json.tool custom_components/kkt_kolbe/strings.json > /dev/null

      - name: Validate translations
        run: |
          python3 -m json.tool custom_components/kkt_kolbe/translations/en.json > /dev/null
          python3 -m json.tool custom_components/kkt_kolbe/translations/de.json > /dev/null

      - name: Validate services.yaml
        run: python3 -c "import yaml; yaml.safe_load(open('custom_components/kkt_kolbe/services.yaml'))"

  validate-hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - name: Run HACS validation
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: integration
          ignore: brands

  validate-hassfest:
    name: Hassfest Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run hassfest validation
        uses: home-assistant/actions/hassfest@d56d093b9ab8d2105bc0cb6ee9bcc0ef4ec8b96d # master

  test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-homeassistant-custom-component
          pip install -r requirements_test.txt

      - name: Run tests
        run: pytest tests/ -v --cov=custom_components/kkt_kolbe --cov-report=term-missing
